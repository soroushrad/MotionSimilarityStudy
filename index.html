<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Motion Similarity Study</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div id="startScreen">
    <h1>Motion Similarity Study</h1>

    <label>Participant ID</label>
    <input type="text" id="participantId" placeholder="e.g., P001">

    <label>Age</label>
    <input type="number" id="age" placeholder="e.g., 27">

    <label>Gender</label>
    <select id="gender">
      <option value="">Select</option>
      <option value="Female">Female</option>
      <option value="Male">Male</option>
      <option value="Other">Other</option>
      <option value="Prefer not to say">Prefer not to say</option>
    </select>

    <button onclick="startStudy()">Next</button>
  </div>

  <div id="studyScreen" class="hidden">
    <h2 id="progressText"></h2>

    <video id="videoPlayer" controls autoplay muted></video>

    <h3>How similar are these two motions?</h3>

    <div class="rating-buttons">
      <button onclick="saveAnswer(1)">1 = Identical</button>
      <button onclick="saveAnswer(2)">2 = Very Similar</button>
      <button onclick="saveAnswer(3)">3 = Somewhat Similar</button>
      <button onclick="saveAnswer(4)">4 = Not Similar</button>
    </div>
  </div>

  <div id="endScreen" class="hidden">
    <h1>Thank you!</h1>
    <p>You have completed the study.</p>
    <button onclick="downloadCSV()">Submit and Download Result</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
