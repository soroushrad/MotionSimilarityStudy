<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Similarity Study</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container py-4">

  <div class="row justify-content-center">
    <div class="col-12">

      <!-- Start Screen -->
      <div id="startScreen" class="card shadow-sm p-4">
        <h1 class="text-center mb-3">Motion Similarity Study</h1>

        <p class="text-center text-muted mb-4">
          Please enter your information to begin the study.
        </p>

        <div class="mb-3">
          <label class="form-label">Age Range</label>
          <select id="age" class="form-select">
            <option value="">Select</option>
            <option value="18–24">18–24</option>
            <option value="25–29">25–29</option>
            <option value="30–34">30–34</option>
            <option value="35+">35+</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label">Gender</label>
          <select id="gender" class="form-select">
            <option value="">Select</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>

        <button class="btn btn-primary w-100" onclick="startStudy()">
          Start
        </button>
      </div>

      <!-- Study Screen -->
      <div id="studyScreen" class="card shadow-sm p-3 p-md-4 hidden">

        <h2 id="progressText" class="text-center mb-3"></h2>

        <div class="ratio ratio-16x9 mb-4">
          <video id="videoPlayer" controls autoplay muted></video>
        </div>

        <h3 class="text-center mb-3">
          How similar are these two motions?
        </h3>

        <div class="row g-3">
          <div class="col-12 col-md-6">
            <button class="btn btn-outline-primary w-100 rating-btn" onclick="saveAnswer(1)">
              1 = Identical
            </button>
          </div>

          <div class="col-12 col-md-6">
            <button class="btn btn-outline-primary w-100 rating-btn" onclick="saveAnswer(2)">
              2 = Very Similar
            </button>
          </div>

          <div class="col-12 col-md-6">
            <button class="btn btn-outline-primary w-100 rating-btn" onclick="saveAnswer(3)">
              3 = Somewhat Similar
            </button>
          </div>

          <div class="col-12 col-md-6">
            <button class="btn btn-outline-primary w-100 rating-btn" onclick="saveAnswer(4)">
              4 = Not Similar
            </button>
          </div>
        </div>

      </div>

      <!-- End Screen -->
      <div id="endScreen" class="card shadow-sm p-4 hidden">

        <h1 class="text-center mb-3">Thank you!</h1>

        <p class="text-center text-muted">
          Your responses have been recorded.
        </p>

        <button class="btn btn-success w-100" onclick="downloadCSV()">
          Submit Results
        </button>

        <p class="text-center text-muted mt-3 mb-0">
          Please wait until the submission is completed.
        </p>

      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
