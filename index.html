<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Motion Similarity Study</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Start Screen -->
  <div id="startScreen">
    <h1>Motion Similarity Study</h1>

    <p style="text-align:center; margin-bottom:20px;">
      Please enter your information to begin the study.
    </p>

    <label>Age Range</label>
    <select id="age">
      <option value="">Select</option>
      <option value="18-24">18–24</option>
      <option value="25-29">25–29</option>
      <option value="30-34">30–34</option>
      <option value="35+">35+</option>
    </select>

    <label>Gender</label>
    <select id="gender">
      <option value="">Select</option>
      <option value="Female">Female</option>
      <option value="Male">Male</option>
      <option value="Other">Other</option>
      <option value="Prefer not to say">Prefer not to say</option>
    </select>

    <button onclick="startStudy()">Start</button>
  </div>

  <!-- Study Screen -->
  <div id="studyScreen" class="hidden">

    <h2 id="progressText"></h2>

    <video id="videoPlayer" controls autoplay muted></video>

    <h3>How similar are these two motions?</h3>

    <div class="rating-buttons">
      <button onclick="saveAnswer(1)">1 = Identical</button>
      <button onclick="saveAnswer(2)">2 = Very Similar</button>
      <button onclick="saveAnswer(3)">3 = Somewhat Similar</button>
      <button onclick="saveAnswer(4)">4 = Not Similar</button>
    </div>

  </div>

  <!-- End Screen -->
  <div id="endScreen" class="hidden">

    <h1>Thank you!</h1>
    <p>Your responses have been recorded.</p>

    <button onclick="downloadCSV()">Submit and Download Result</button>

    <p style="margin-top:20px; text-align:center; color:gray;">
      Please make sure the file is downloaded successfully.
    </p>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
